<svg width="435" height="100" viewBox="0 0 435 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Efeito de Brilho (Glow) -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Texto Principal -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="900" fill="#39FF14" filter="url(#glow)" style="letter-spacing: 8px; text-transform: uppercase;">
    BYPASS
  </text>
  
  <!-- Detalhes de Hacker Art (Linhas) -->
  <rect x="110" y="75" width="215" height="2" fill="#39FF14" opacity="0.6" />
  <rect x="150" y="82" width="135" height="1" fill="#39FF14" opacity="0.4" />
</svg>
